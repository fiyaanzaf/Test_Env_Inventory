name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'Inventory_Manager/Inventory_Manager_PWA/**'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Inventory_Manager/Inventory_Manager_PWA

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Java (required by Android Gradle) ───────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ─────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install npm dependencies ────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 6. Build Vite PWA (outputs to dist/) ───────────────
      - name: Build PWA
        run: npm run build

      # ── 7. Add Android platform via Capacitor ──────────────
      - name: Add Capacitor Android platform
        run: npx cap add android

      # ── 8. Enable HTTP cleartext for LAN connections ───────
      - name: Patch Android for cleartext HTTP (LAN support)
        run: |
          # Create xml resource directory
          mkdir -p android/app/src/main/res/xml

          # Write network security config
          cat > android/app/src/main/res/xml/network_security_config.xml << 'XML_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
          </network-security-config>
          XML_EOF

          # Patch AndroidManifest.xml — add cleartext + network security config
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # Only patch if not already patched
          if ! grep -q 'usesCleartextTraffic' "$MANIFEST"; then
            sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config" android:usesCleartextTraffic="true"/' "$MANIFEST"
            echo "AndroidManifest.xml patched for cleartext HTTP"
          else
            echo "Already patched, skipping"
          fi

          # Show result for debugging
          echo "--- AndroidManifest.xml ---"
          cat "$MANIFEST"

      # ── 9. Sync web assets into Android project ────────────
      - name: Capacitor Sync
        run: npx cap sync android

      # ── 10. Build debug APK ────────────────────────────────
      - name: Build Debug APK
        working-directory: Inventory_Manager/Inventory_Manager_PWA/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      # ── 11. Upload APK as downloadable artifact ────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StoreOS-debug-apk
          path: Inventory_Manager/Inventory_Manager_PWA/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
