name: Build Android APK (Release)

on:
  push:
    branches: [main]
    paths:
      - 'Inventory_Manager_PWA/**'
  workflow_dispatch: # Manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Inventory_Manager_PWA

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      # ── 2. Node.js ─────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      # ── 3. Java (required by Android Gradle) ───────────────
      - name: Setup JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 4. Android SDK ─────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.1

      # ── 5. Install npm dependencies ────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 6. Build Vite PWA (outputs to dist/) ───────────────
      - name: Build PWA
        run: npm run build

      # ── 7. Sync web assets into Android project ────────────
      #    android/ is already committed — only web assets need syncing
      - name: Capacitor Sync
        run: npx cap sync android

      # ── 8. Decode release keystore from GitHub Secret ──────
      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release-keystore.jks

      # ── 9. Extract version from package.json ───────────────
      - name: Extract version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── 10. Build signed release APK ───────────────────────
      - name: Build Release APK
        working-directory: Inventory_Manager_PWA/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ steps.pkg.outputs.version }}

      # ── 11. Upload signed APK as downloadable artifact ─────
      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: StoreOS-v${{ steps.pkg.outputs.version }}-build${{ github.run_number }}
          path: Inventory_Manager_PWA/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
